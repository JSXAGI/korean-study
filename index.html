<!doctype html>
<meta name="google" content="notranslate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>韓国語学習 - 最終復元版</title>

  <link rel="stylesheet" href="style.css">

  <script src="data.js"></script>
</head>

<body>
  <header class="app-header">
    <button class="home-link" onclick="showView('home')">🏠</button>
    <h1 class="app-title">韓国語学習</h1>
  </header>

<main class="main-content">
    <div id="home-view">
      <div class="card text-center">
        <h2 style="margin-top:0;">📚 学習モード</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <button class="btn btn-primary" onclick="showView('vocabulary')">単語帳</button>
          <button class="btn btn-primary" style="background:var(--secondary-color);" onclick="showView('grammar-choice')">文法解説</button>
        </div>
      </div>

<div class="card text-center" style="background-color: #fff; border: 2px solid #15DAF6; padding: 8px 10px; border-radius: 12px; font-weight: bold; margin-bottom: 10px;">
  <div class="level-badge-text">👽 PC利用時「ブラウザ75％縮小」での学習を推奨</div>
</div>

      <div class="card text-center" style="border: 4px solid var(--accent-color);">
        <h2 style="color:var(--accent-color); margin-top:0;">🧠 クエストモード</h2>
        <button class="btn btn-primary" style="background:#059669; margin-bottom:12px;" onclick="startQuestMode()">🔤 単語を聞き取る</button>
        <button class="btn btn-primary" style="background:#8b5cf6;" onclick="startGrammarQuest()">🧠 文法を聞き取る</button>
      </div>
    </div>

    <div id="vocabulary-view" class="hidden">
      <div class="card text-center">
        <div class="level-selector" id="v-level-selector">
          <button class="btn btn-lvl active" onclick="setVocabLevel('Beginner', this)">初級</button>
          <button class="btn btn-lvl" onclick="setVocabLevel('Intermediate', this)">中級</button>
          <button class="btn btn-lvl" onclick="setVocabLevel('Advanced', this)">上級</button>
          <button class="btn btn-lvl" onclick="setVocabLevel('All', this)" style="background:#8b5cf6; color:white;">ALL</button>
        </div>
        <div><span id="v-lvl-badge" class="badge"></span> <span id="v-cat-badge" class="badge" style="background:var(--accent-color);"></span></div>
        <div id="v-emoji" style="font-size: 5.5rem; margin: 15px 0;"></div>
        <div class="lang-row"><div class="lang-label">ENGLISH</div><div class="lang-text"><span id="v-en"></span><button class="btn-speak" onclick="speakLocal('v-en','en')">🔊</button></div></div>
        <div class="lang-row"><div class="lang-label">KOREAN</div><div class="lang-text"><span id="v-ko"></span><button class="btn-speak" onclick="speakLocal('v-ko','ko')">🔊</button></div></div>
        <div class="lang-row"><div class="lang-label">JAPANESE</div><div class="lang-text"><span id="v-ja"></span><button class="btn-speak" onclick="speakLocal('v-ja','ja')">🔊</button></div></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">
          <button class="btn" style="background:#e2e8f0;" onclick="changeWord(-1)">◀ BACK</button>
          <button class="btn btn-primary" onclick="changeWord(1)">NEXT ▶</button>
        </div>
        <button class="btn btn-primary" style="margin-top:12px; background:var(--accent-color);" onclick="shuffleWords()">🔀 SHUFFLE (ランダム)</button>
      </div>
    </div>

    <div id="grammar-choice-view" class="hidden">
      <div class="card text-center">
        <h2 style="margin-top:0;">レベルを選んでください</h2>
        <div style="display: grid; gap: 12px;">
          <button class="btn btn-primary" onclick="currentLevel='Beginner'; showGrammarView()">初級 (Beginner)</button>
          <button class="btn btn-primary" style="background:var(--secondary-color);" onclick="currentLevel='Intermediate'; showGrammarView()">中級 (Intermediate)</button>
          <button class="btn btn-primary" style="background:#ec4899;" onclick="currentLevel='Advanced'; showGrammarView()">上級 (Advanced)</button>
          <button class="btn" style="background:#e2e8f0;" onclick="showView('home')">戻る</button>
        </div>
      </div>
    </div>

    <div id="grammar-view" class="hidden">
      <div class="card">
        <div id="g-cat-badge" class="badge" style="display:block; text-align:center; margin-bottom:15px;"></div>
        <div class="lang-row"><div class="lang-label">ENGLISH</div><div class="lang-text"><span id="g-en"></span><button class="btn-speak" onclick="speakLocal('g-en','en')">🔊</button></div></div>
        <div class="lang-row"><div class="lang-label">KOREAN</div><div class="lang-text"><span id="g-ko"></span><button class="btn-speak" onclick="speakLocal('g-ko','ko')">🔊</button></div></div>
        <div class="lang-row"><div class="lang-label">JAPANESE</div><div class="lang-text"><span id="g-ja"></span><button class="btn-speak" onclick="speakLocal('g-ja','ja')">🔊</button></div></div>
        <div id="g-exp" style="margin-top:15px; padding:15px; background:white; border-radius:12px; font-size:1.1rem; border:1px solid #e2e8f0; line-height:1.5;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">
          <button class="btn" style="background:#e2e8f0;" onclick="changeGrammar(-1)">◀ BACK</button>
          <button class="btn btn-primary" onclick="changeGrammar(1)">NEXT ▶</button>
        </div>
        <button class="btn btn-primary" style="margin-top:12px; background:var(--accent-color);" onclick="shuffleGrammar()">🔀 SHUFFLE (ランダム)</button>
      </div>
    </div>

    <div id="quest-view" class="hidden">
      <div class="card text-center">
        <h3 id="quest-title" style="margin-top:0; color:var(--secondary-color);">Listening Quest</h3>
        <div id="q-box" style="margin: 30px 0;"></div>
        <div id="a-grid" class="quest-grid"></div>
        <button class="btn" style="margin-top:30px; width:100%; background:#e2e8f0;" onclick="showView('home')">クエストを終了する</button>
      </div>
    </div>
</main>

<script>


let currentLevel = 'Beginner';
let vIndex = 0;
let gIndex = 0;
let isGrammarMode = false;
let qTarget = null;

// 音声合成用の窓口を一つに固定して定義
const synth = window.speechSynthesis;
let utterance = new SpeechSynthesisUtterance();

function showView(id) {
  ['home','grammar-choice','vocabulary','grammar','quest'].forEach(v=>{
    const el = document.getElementById(v + '-view');
    if(el) el.classList.add('hidden');
  });
  document.getElementById(id + '-view').classList.remove('hidden');
  window.scrollTo(0,0);
  if(id === 'vocabulary') updateWord();
  if(id === 'grammar') updateGrammar();
}

/* 単語学習ロジック（原本復元） */
function setVocabLevel(lvl, btn) {
  currentLevel = lvl;
  vIndex = 0;
  document.querySelectorAll('#v-level-selector .btn-lvl').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateWord();
}

function updateWord() {
  const list = (currentLevel === 'All') ? vocabularyData : vocabularyData.filter(d => d.level === currentLevel);
  if(!list.length) return;
  const d = list[vIndex % list.length];
  document.getElementById('v-en').innerText = d.en;
  document.getElementById('v-ko').innerText = d.sw;
  document.getElementById('v-ja').innerText = d.ja;
  document.getElementById('v-emoji').innerText = d.emoji;
  document.getElementById('v-lvl-badge').innerText = d.level;
  document.getElementById('v-cat-badge').innerText = d.category;
}

function changeWord(s) {
  const list = (currentLevel === 'All') ? vocabularyData : vocabularyData.filter(d => d.level === currentLevel);
  vIndex = (vIndex + s + list.length) % list.length;
  updateWord();
}

function shuffleWords() {
  const list = (currentLevel === 'All') ? vocabularyData : vocabularyData.filter(d => d.level === currentLevel);
  vIndex = Math.floor(Math.random() * list.length);
  updateWord();
}

/* 文法学習ロジック（原本復元） */
function updateGrammar() {
  const list = grammarData.filter(d => d.level === currentLevel);
  if(!list.length) { alert("このレベルのデータはまだありません"); showView('grammar-choice'); return; }
  const d = list[gIndex % list.length];
  document.getElementById('g-en').innerText = d.en_phrase;
  document.getElementById('g-ko').innerText = d.sw_phrase;
  document.getElementById('g-ja').innerText = d.ja_trans;
  document.getElementById('g-exp').innerText = d.ja_explanation;
  document.getElementById('g-cat-badge').innerText = d.category || d.title;
}

function changeGrammar(s) {
  const list = grammarData.filter(d => d.level === currentLevel);
  gIndex = (gIndex + s + list.length) % list.length;
  updateGrammar();
}

function shuffleGrammar() {
  const list = grammarData.filter(d => d.level === currentLevel);
  gIndex = Math.floor(Math.random() * list.length);
  updateGrammar();
}

function showGrammarView() { gIndex = 0; showView('grammar'); }

/* クエストロジック（最新統合） */
function startQuestMode() { isGrammarMode = false; showView('quest'); setTimeout(generateQuest, 100); }
function startGrammarQuest() { isGrammarMode = true; showView('quest'); setTimeout(generateQuest, 100); }

function generateQuest() {
  let list = isGrammarMode ? grammarData : vocabularyData;
  qTarget = list[Math.floor(Math.random() * list.length)];
  document.getElementById('quest-title').innerText = isGrammarMode ? "🧠 文法聞き取りクエスト" : "🔤 単語聞き取りクエスト";
  document.getElementById('q-box').innerHTML = `<button class="btn" onclick="speakQ()" style="width:130px; height:130px; font-size:4.5rem; border-radius:50%; background:var(--primary-color); color:white; border:none; box-shadow:0 6px 20px rgba(0,0,0,0.15);">🔊</button><p style="margin-top:15px; font-weight:bold; color:#64748b;">音を聞いて正しい意味を選んでね</p>`;
  
  let choices = [qTarget];
  while(choices.length < 4 && choices.length < list.length) {
    let r = list[Math.floor(Math.random() * list.length)];
    if(!choices.includes(r)) choices.push(r);
  }
  choices.sort(() => Math.random() - 0.5);
  const area = document.getElementById('a-grid');
  area.innerHTML = "";
  choices.forEach(c => {
    const b = document.createElement('button');
    b.className = 'btn btn-lvl';
    b.style.minHeight = '85px';
    b.innerText = isGrammarMode ? c.ja_trans : c.ja;
    b.onclick = () => { 
      if(c === qTarget){ alert("🎉 正解！"); generateQuest(); } 
      else { alert("❌ 残念！もう一回聞いてみて！"); } 
    };
    area.appendChild(b);
  });
  speakQ();
}

function speakQ() {
  synth.cancel(); // 外で定義した synth を使う
  if (!qTarget) return;

  // 文法モードか単語モードかでテキストを切り替え
  let text = isGrammarMode ? qTarget.sw_phrase : qTarget.sw;
  
  // ハングル以外（英語やカッコ）をきれいに掃除
  text = text.replace(/\([^)]*\)/g, '').replace(/\[[^\]]*\]/g, '');
  text = text.replace(/[^가-힣ㄱ-ㅎㅏ-ㅣ0-9\s\.\?\!]/g, '');
  
  // 外で定義した utterance に中身をセット
  utterance.text = text.trim();
  utterance.lang = 'ko-KR';
  utterance.rate = 0.8;

  // スマホでの不具合を防ぐために少し待ってから再生
  setTimeout(() => {
    synth.speak(utterance);
  }, 50);
}

function speakLocal(id, lang) {
  // 1. 今しゃべっている音声を即座に止める
  synth.cancel();

  let text = document.getElementById(id).innerText;

  // 2. テキストの洗浄（以前作った最強の洗浄ロジックを流用）
  if (lang === 'ko') {
    text = text.replace(/\([^)]*\)/g, '').replace(/\[[^\]]*\]/g, '');
    text = text.replace(/[^가-힣ㄱ-ㅎㅏ-ㅣ0-9\s\.\?\!]/g, '');
  }

  // 3. 固定した窓口に新しいテキストと設定を流し込む
  utterance.text = text.trim();
  utterance.lang = (lang === 'ko') ? 'ko-KR' : (lang === 'en' ? 'en-US' : 'ja-JP');
  utterance.rate = 0.8;

  // 4. 少しだけ間を置いてから再生（スマホのバグ回避用）
  setTimeout(() => {
    synth.speak(utterance);
  }, 50);
}
</script>
</body>
</html>
